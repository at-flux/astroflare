name: Publish

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.0.1)'
        required: true
        type: string

jobs:
  check-existing:
    name: Check if package already exists
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      npm-exists: ${{ steps.check.outputs.npm-exists }}
      should-publish: ${{ steps.check.outputs.should-publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            git fetch --tags
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if npm package already exists
        id: check
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          echo "Checking @at-flux/astroflare@$VERSION..."
          NPM_EXISTS="false"
          if npm view @at-flux/astroflare@$VERSION version >/dev/null 2>&1; then
            NPM_EXISTS="true"
            echo "✅ npm package v$VERSION already exists"
          else
            echo "❌ npm package v$VERSION does not exist"
          fi
          echo "npm-exists=$NPM_EXISTS" >> $GITHUB_OUTPUT
          if [ "$NPM_EXISTS" == "true" ]; then
            echo "should-publish=false" >> $GITHUB_OUTPUT
          else
            echo "should-publish=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: check-existing
    if: needs.check-existing.outputs.should-publish == 'true' && needs.check-existing.outputs.npm-exists != 'true'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Update npm (required for trusted publishing)
        run: npm install -g npm@latest

      - name: Update package.json version
        run: |
          cd packages/astroflare
          EXPECTED_VERSION="${{ needs.check-existing.outputs.version }}"
          echo "Setting version to $EXPECTED_VERSION"
          npm version $EXPECTED_VERSION --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter @at-flux/astroflare build

      - name: Publish to npm
        run: |
          cd packages/astroflare
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
